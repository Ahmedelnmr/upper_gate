<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل المعرض — Upper Gate Egypt 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@500;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14181F;
  --ink-2:#1C212B;
  --ink-3:#262D39;
  --paper:#EDE7DC;
  --paper-dim:#B9B2A4;
  --gold:#C9A05C;
  --gold-soft:#C9A05C33;
  --teal:#4C7C73;
  --teal-soft:#4C7C7333;
  --terra:#B5533C;
  --terra-soft:#B5533C33;
  --line:#FFFFFF14;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 85% -10%, #2A3142 0%, transparent 60%),
    var(--ink);
  color:var(--paper);
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.display{font-family:'Markazi Text',serif;}

/* ===== Header ===== */
header{
  padding:28px 32px 18px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:20px;flex-wrap:wrap;
}
.brand-eyebrow{
  font-size:13px;letter-spacing:.04em;color:var(--gold);
  font-weight:700;margin-bottom:6px;
}
.brand-title{
  font-family:'Markazi Text',serif;
  font-size:42px;font-weight:700;line-height:1;color:var(--paper);
}
.brand-sub{color:var(--paper-dim);font-size:14px;margin-top:6px;}
.dates{
  display:flex;gap:10px;
}
.date-chip{
  border:1px solid var(--line);border-radius:10px;
  padding:8px 14px;font-size:13px;color:var(--paper-dim);
  background:var(--ink-2);
}
.date-chip b{color:var(--paper);display:block;font-size:15px;font-weight:700;}

/* ===== Layout ===== */
.wrap{display:flex;gap:0;max-width:1400px;margin:0 auto;}
.main{flex:1;min-width:0;padding:24px 32px 60px;}
.aside{
  width:280px;flex-shrink:0;
  border-left:1px solid var(--line);
  padding:24px 20px 40px;
  position:sticky;top:0;align-self:flex-start;
  max-height:100vh;overflow-y:auto;
}
.aside h3{
  font-size:12px;letter-spacing:.06em;color:var(--paper-dim);
  text-transform:uppercase;font-weight:700;margin:22px 0 10px;
}
.aside h3:first-child{margin-top:0;}

/* search */
.search-box{
  position:relative;margin-bottom:6px;
}
.search-box input{
  width:100%;background:var(--ink-2);border:1px solid var(--line);
  border-radius:10px;padding:11px 14px;color:var(--paper);
  font-family:inherit;font-size:14px;outline:none;
  transition:border-color .15s;
}
.search-box input:focus{border-color:var(--gold);}
.search-box input::placeholder{color:var(--paper-dim);}

/* filter chips */
.chip-group{display:flex;flex-wrap:wrap;gap:7px;}
.chip{
  border:1px solid var(--line);background:var(--ink-2);
  color:var(--paper-dim);padding:7px 12px;border-radius:20px;
  font-size:13px;cursor:pointer;user-select:none;
  transition:.15s;font-family:inherit;
}
.chip:hover{border-color:var(--gold-soft);color:var(--paper);}
.chip.active{
  background:var(--gold-soft);border-color:var(--gold);color:var(--gold);
  font-weight:700;
}
.chip.active.teal-active{background:var(--teal-soft);border-color:var(--teal);color:#9fd6c9;}
.chip.active.terra-active{background:var(--terra-soft);border-color:var(--terra);color:#e6a08f;}

.clear-btn{
  margin-top:18px;width:100%;background:transparent;border:1px dashed var(--line);
  color:var(--paper-dim);padding:9px;border-radius:10px;font-size:12.5px;
  cursor:pointer;font-family:inherit;
}
.clear-btn:hover{color:var(--gold);border-color:var(--gold-soft);}

.result-count{color:var(--paper-dim);font-size:13px;margin-bottom:16px;}
.result-count b{color:var(--gold);}

/* ===== Cards grid ===== */
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:16px;
}
.card{
  background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 18px 16px;cursor:pointer;transition:.18s;
  display:flex;flex-direction:column;gap:10px;
}
.card:hover{
  border-color:var(--gold-soft);transform:translateY(-2px);
  box-shadow:0 12px 30px -14px #00000080;
}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.card-company{font-size:11.5px;color:var(--gold);letter-spacing:.03em;font-weight:700;}
.card-title{font-family:'Markazi Text',serif;font-size:25px;font-weight:700;color:var(--paper);line-height:1.15;}
.card-loc{font-size:13px;color:var(--paper-dim);display:flex;align-items:center;gap:5px;}
.type-tag{
  flex-shrink:0;font-size:11px;padding:4px 9px;border-radius:8px;font-weight:700;
  white-space:nowrap;
}
.tag-res{background:var(--gold-soft);color:var(--gold);}
.tag-com{background:var(--terra-soft);color:#e6a08f;}
.tag-hotel{background:var(--teal-soft);color:#9fd6c9;}
.tag-mixed{background:#7c6fb533;color:#b8acec;}

.card-facts{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;}
.fact{
  font-size:12px;color:var(--paper-dim);background:var(--ink-3);
  padding:5px 9px;border-radius:7px;border:1px solid var(--line);
}
.fact b{color:var(--paper);font-weight:700;}
.card-foot{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:4px;padding-top:10px;border-top:1px solid var(--line);
}
.price-from{font-size:14px;color:var(--paper);}
.price-from b{color:var(--gold);font-weight:700;}
.delivery-badge{font-size:11.5px;color:var(--paper-dim);}
.delivery-badge.now{color:#9fd6c9;font-weight:700;}

.empty-state{
  text-align:center;padding:70px 20px;color:var(--paper-dim);
}
.empty-state .display{font-size:30px;color:var(--paper);display:block;margin-bottom:8px;}

/* ===== Detail Drawer ===== */
.overlay{
  position:fixed;inset:0;background:#0008;backdrop-filter:blur(2px);
  z-index:50;opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:auto;}
.drawer{
  position:fixed;top:0;left:0;height:100vh;width:min(560px,92vw);
  background:var(--ink);border-right:1px solid var(--line);
  z-index:51;transform:translateX(-105%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
  overflow-y:auto;
}
.drawer.open{transform:translateX(0);}
.drawer-head{
  padding:26px 26px 18px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--ink);z-index:2;
}
.drawer-close{
  position:absolute;left:18px;top:18px;background:var(--ink-2);border:1px solid var(--line);
  color:var(--paper-dim);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;
}
.drawer-close:hover{color:var(--gold);border-color:var(--gold-soft);}
.drawer-company{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.03em;}
.drawer-title{font-family:'Markazi Text',serif;font-size:36px;font-weight:700;margin:4px 0 8px;}
.drawer-loc{color:var(--paper-dim);font-size:14px;}
.drawer-body{padding:22px 26px 50px;}
.section{margin-bottom:26px;}
.section-label{
  font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);
  font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--line);}

.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kv{background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.kv .k{font-size:11.5px;color:var(--paper-dim);margin-bottom:2px;}
.kv .v{font-size:14.5px;color:var(--paper);font-weight:700;}

table.plan-table{width:100%;border-collapse:collapse;font-size:13.5px;}
table.plan-table th{
  text-align:right;color:var(--paper-dim);font-weight:700;font-size:12px;
  padding:8px 10px;border-bottom:1px solid var(--line);
}
table.plan-table td{padding:9px 10px;border-bottom:1px solid var(--line);color:var(--paper);}
table.plan-table tr:last-child td{border-bottom:none;}
table.plan-table td.hl{color:var(--gold);font-weight:700;}

.price-table-wrap{overflow-x:auto;}

.unit-pill{
  display:inline-flex;justify-content:space-between;width:100%;
  background:var(--ink-2);border:1px solid var(--line);border-radius:10px;
  padding:10px 13px;margin-bottom:7px;font-size:13.5px;
}
.unit-pill .name{color:var(--paper-dim);}
.unit-pill .val{color:var(--gold);font-weight:700;}

.opportunity{
  background:linear-gradient(135deg,#2A3142,var(--ink-2));
  border:1px solid var(--gold-soft);border-radius:12px;padding:16px;
  font-size:14px;line-height:1.8;color:var(--paper);
}
.opportunity .who{color:var(--gold);font-weight:700;font-size:13px;display:block;margin-bottom:4px;}

.contact-bar{
  background:var(--ink-2);border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:10px;
}
.contact-bar div{font-size:13px;color:var(--paper-dim);}
.contact-bar b{color:var(--paper);display:block;font-size:15px;}

@media (max-width:880px){
  .wrap{flex-direction:column;}
  .aside{
    width:100%;border-left:none;border-bottom:1px solid var(--line);
    position:static;max-height:none;
  }
  .main{padding:20px 18px 50px;}
  header{padding:22px 18px 16px;}
  .brand-title{font-size:32px;}
}
</style>
</head>

/* type label colors */
const TYPE_CLASS = {res:'tag-res', com:'tag-com', hotel:'tag-hotel', mixed:'tag-mixed'};

const TYPE_OPTIONS = [
  {key:'res', label:'سكني'},
  {key:'com', label:'تجاري'},
  {key:'mixed', label:'إداري/مختلط'},
  {key:'hotel', label:'فندقي'},
];
const DELIVERY_OPTIONS = [
  {key:'now', label:'استلام فوري'},
  {key:'soon', label:'خلال 3 سنوات'},
];
const AUDIENCE_OPTIONS = [
  {key:'family', label:'عائلة راقية'},
  {key:'investor', label:'مستثمر عائد'},
  {key:'investor_mid', label:'رأس مال متوسط'},
  {key:'business', label:'صاحب أعمال'},
  {key:'luxury', label:'باحث عن تميز'},
];

const state = {
  search:'', type:null, delivery:null, audience:null, company:null
};

/* ======================= RENDER FILTER CHIPS ======================= */
function renderChipGroup(containerId, options, stateKey){
  const el = document.getElementById(containerId);
  el.innerHTML = options.map(o=>
    `<button class="chip" data-key="${stateKey}" data-val="${o.key}">${o.label}</button>`
  ).join('');
}
renderChipGroup('typeFilters', TYPE_OPTIONS, 'type');
renderChipGroup('deliveryFilters', DELIVERY_OPTIONS, 'delivery');
renderChipGroup('audienceFilters', AUDIENCE_OPTIONS, 'audience');

const companies = [...new Set(DATA.map(d=>d.company))];
renderChipGroup('companyFilters', companies.map(c=>({key:c,label:c})), 'company');

document.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const key = btn.dataset.key, val = btn.dataset.val;
    state[key] = state[key] === val ? null : val;
    document.querySelectorAll(`.chip[data-key="${key}"]`).forEach(c=>c.classList.remove('active'));
    if(state[key]) btn.classList.add('active');
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', e=>{
  state.search = e.target.value.trim().toLowerCase();
  render();
});

document.getElementById('clearBtn').addEventListener('click', ()=>{
  state.search=''; state.type=null; state.delivery=null; state.audience=null; state.company=null;
  document.getElementById('searchInput').value='';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  render();
});

/* ======================= FILTER + RENDER GRID ======================= */
function matches(item){
  if(state.type && item.type !== state.type) return false;
  if(state.company && item.company !== state.company) return false;
  if(state.audience && !item.audience.includes(state.audience)) return false;
  if(state.delivery === 'now' && !item.deliveryNow) return false;
  if(state.delivery === 'soon' && !(item.deliveryNow || /[1-3]\s*سن/.test(item.delivery) || /202[6-9]/.test(item.delivery))) return false;
  if(state.search){
    const hay = (item.name+' '+item.company+' '+item.location+' '+item.typeLabel).toLowerCase();
    if(!hay.includes(state.search)) return false;
  }
  return true;
}

function render(){
  const results = DATA.filter(matches);
  document.getElementById('resultCount').innerHTML = `<b>${results.length}</b> مشروع من إجمالي ${DATA.length}`;
  const grid = document.getElementById('grid');
  if(results.length===0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <span class="display">مفيش نتائج تطابق البحث</span>
      جرب تمسح بعض الفلاتر أو غيّر كلمة البحث
    </div>`;
    return;
  }
  grid.innerHTML = results.map(item=>`
    <div class="card" data-id="${item.id}">
      <div class="card-top">
        <div>
          <div class="card-company">${item.company}</div>
          <div class="card-title display">${item.name}</div>
          <div class="card-loc">📍 ${item.location}</div>
        </div>
        <div class="type-tag ${TYPE_CLASS[item.type]}">${item.typeLabel}</div>
      </div>
      <div class="card-facts">
        ${item.facts.map(f=>`<div class="fact">${f[0]}: <b>${f[1]}</b></div>`).join('')}
      </div>
      <div class="card-foot">
        <div class="price-from">يبدأ من <b>${item.priceFrom}</b></div>
        <div class="delivery-badge ${item.deliveryNow?'now':''}">${item.deliveryNow?'⚡ ':''}${item.delivery}</div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', ()=> openDrawer(card.dataset.id));
  });
}

/* ======================= DRAWER ======================= */
const overlay = document.getElementById('overlay');
const drawer = document.getElementById('drawer');

function openDrawer(id){
  const item = DATA.find(d=>d.id===id);
  if(!item) return;

  drawer.innerHTML = `
    <div class="drawer-head">
      <button class="drawer-close" id="drawerClose">✕</button>
      <div class="drawer-company">${item.company}</div>
      <div class="drawer-title display">${item.name}</div>
      <div class="drawer-loc">📍 ${item.location} &nbsp;·&nbsp; <span class="type-tag ${TYPE_CLASS[item.type]}">${item.typeLabel}</span></div>
    </div>
    <div class="drawer-body">

      <div class="section">
        <div class="section-label">بيانات أساسية</div>
        <div class="kv-grid">
          ${item.kv.filter(k=>k[0]!=='—').map(k=>`<div class="kv"><div class="k">${k[0]}</div><div class="v">${k[1]}</div></div>`).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-label">الوحدات والأسعار</div>
        ${item.units.map(u=>`<div class="unit-pill"><span class="name">${u[0]}</span><span class="val">${u[1]}</span></div>`).join('')}
      </div>

      <div class="section">
        <div class="section-label">أنظمة السداد</div>
        <div class="price-table-wrap">
        <table class="plan-table">
          <thead><tr><th>النظام</th><th>المقدم</th><th>المدة</th><th>الخصم</th></tr></thead>
          <tbody>
            ${item.plans.map(p=>`<tr><td>${p[0]}</td><td class="hl">${p[1]}</td><td>${p[2]}</td><td class="hl">${p[3]}</td></tr>`).join('')}
          </tbody>
        </table>
        </div>
        ${item.notes?`<div style="margin-top:10px;font-size:13px;color:var(--paper-dim);line-height:1.7">📌 ${item.notes}</div>`:''}
      </div>

      <div class="section">
        <div class="section-label">الفرصة الاستثمارية</div>
        <div class="opportunity">
          <span class="who">ليه تقترحه دلوقتي؟</span>
          ${item.opportunity}
        </div>
      </div>

      <div class="contact-bar">
        <div>معرض Upper Gate Egypt 2026<br><b>المنيا 3–4 يوليو · سوهاج 10–11 يوليو</b></div>
      </div>
    </div>
  `;

  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  overlay.classList.add('open');
  drawer.classList.add('open');
}

function closeDrawer(){
  overlay.classList.remove('open');
  drawer.classList.remove('open');
}
overlay.addEventListener('click', closeDrawer);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDrawer(); });

render();
</script>
</body>
</html>
